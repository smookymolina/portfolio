services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      # Enable BuildKit (required for --mount=type=cache in Dockerfile)
      args:
        BUILDKIT_INLINE_CACHE: '1'
    image: jair-portfolio:latest
    container_name: jair-portfolio
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    # Read-only filesystem — Next.js standalone only needs /tmp for scratch
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
